name: Publish Emergency RC

on:
  workflow_dispatch:
    inputs:
      rc_tag:
        description: "RC tag to publish as an emergency prerelease (for example: v0.1.3-rc.1)"
        required: true
        type: string
      allow_superseded_rc:
        description: "Allow publishing an older RC after a newer RC exists"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate RC tag
        run: |
          case "${{ inputs.rc_tag }}" in
            v*-rc.*) ;;
            *)
              echo "rc_tag must match vX.Y.Z-rc.N"
              exit 1
              ;;
          esac

      - name: Reject superseded RC by default
        env:
          RC_TAG: ${{ inputs.rc_tag }}
          ALLOW_SUPERSEDED_RC: ${{ inputs.allow_superseded_rc }}
        run: |
          python3 - <<'PY'
          import os
          import re
          import subprocess
          import sys

          rc_tag = os.environ["RC_TAG"]
          allow_override = os.environ.get("ALLOW_SUPERSEDED_RC", "false").lower() == "true"

          match = re.fullmatch(r"(v\d+\.\d+\.\d+)-rc\.(\d+)", rc_tag)
          if not match:
              print(f"Invalid RC tag: {rc_tag}")
              sys.exit(1)

          base_tag = match.group(1)
          latest_tag = rc_tag
          latest_seq = int(match.group(2))

          tags = subprocess.check_output(
              ["git", "tag", "-l", f"{base_tag}-rc.*"],
              text=True,
          ).splitlines()

          for tag in tags:
              other = re.fullmatch(rf"{re.escape(base_tag)}-rc\.(\d+)", tag)
              if other and int(other.group(1)) > latest_seq:
                  latest_seq = int(other.group(1))
                  latest_tag = tag

          if latest_tag != rc_tag and not allow_override:
              print(f"{rc_tag} has been superseded by newer RC {latest_tag}")
              print("Re-run with allow_superseded_rc=true only if you intentionally want to publish the older RC.")
              sys.exit(1)

          if latest_tag != rc_tag:
              print(f"Override accepted: publishing superseded RC {rc_tag} while newer RC {latest_tag} exists.")
          else:
              print(f"{rc_tag} is the latest RC for {base_tag}")
          PY

      - name: Publish emergency prerelease
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RC_TAG: ${{ inputs.rc_tag }}
        run: |
          cat > emergency-release-notes.md <<'EOF'
          ## Emergency Release Candidate

          This prerelease is intended for affected users who need a fix before the notarized stable release is available.

          - macOS artifacts may still be signed-only
          - Use this only if the issue fixed here is blocking you
          - A notarized stable release will follow once the stable promotion workflow completes

          ### macOS fallback

          If macOS blocks opening the app, you can remove quarantine manually:

          ```bash
          sudo xattr -rd com.apple.quarantine /Applications/ClawZ.app
          ```
          EOF

          gh release edit "${RC_TAG}" \
            --draft=false \
            --prerelease \
            --title "ClawZ ${RC_TAG} Emergency Release Candidate" \
            --notes-file emergency-release-notes.md
