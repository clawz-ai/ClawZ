name: RC Release

on:
  push:
    tags:
      - "v*-rc.*"

permissions:
  contents: write

jobs:
  release:
    env:
      BUILD_NUMBER: ${{ github.run_number }}
      RC_TAG: ${{ github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
            platform_id: mac
            arch_id: arm64
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
            platform_id: mac
            arch_id: x64
          - platform: ubuntu-22.04
            args: --target x86_64-unknown-linux-gnu --bundles deb,rpm
            rust_target: x86_64-unknown-linux-gnu
            platform_id: linux
            arch_id: x64
          - platform: ubuntu-22.04-arm
            args: --target aarch64-unknown-linux-gnu --bundles deb,rpm
            rust_target: aarch64-unknown-linux-gnu
            platform_id: linux
            arch_id: arm64

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2

      - name: Verify build manifest
        run: node scripts/build-manifest.mjs check

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Bundle Node.js runtime
        run: bash scripts/download-node.sh "" ${{ matrix.rust_target }}

      - name: Bundle openclaw
        run: bash scripts/bundle-openclaw.sh "" ${{ matrix.rust_target }}

      - name: Generate build info
        run: bash scripts/gen-build-info.sh

      - name: Import Apple certificate
        if: runner.os == 'macOS' && env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Sign bundled native binaries
        if: runner.os == 'macOS' && env.APPLE_SIGNING_IDENTITY != ''
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          # Sign native addons/helpers in resources/ so Apple notarization passes.
          #
          # Do NOT re-sign the official Node.js executables we bundle into:
          #   - resources/NodeHelper.app/Contents/MacOS/node
          #   - resources/node/bin/node
          #
          # Those binaries already ship with Node.js Foundation signatures and
          # the broader V8 entitlements required on Intel macOS. Re-signing them
          # with our slimmer app entitlements strips permissions like
          # allow-unsigned-executable-memory / disable-executable-page-protection
          # and causes x64 release builds to crash at runtime.
          find resources -type f \( \
            -name "*.node" -o -name "*.dylib" \
            -o -name "spawn-helper" \
          \) | while read -r bin; do
            echo "Signing: $bin"
            codesign --force --options runtime --timestamp \
              --sign "$APPLE_SIGNING_IDENTITY" \
              --entitlements src-tauri/entitlements.plist \
              "$bin"
          done

          # Sign the helper app bundle wrapper while preserving the original
          # Node binary signature inside it.
          if [ -d "resources/NodeHelper.app" ]; then
            echo "Signing bundle: resources/NodeHelper.app"
            codesign --force --options runtime --timestamp \
              --sign "$APPLE_SIGNING_IDENTITY" \
              --entitlements src-tauri/entitlements.plist \
              "resources/NodeHelper.app"
          fi

      - name: Build candidate artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          BUILD_NUMBER: ${{ env.BUILD_NUMBER }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPIMAGE_EXTRACT_AND_RUN: 1
          NO_STRIP: "true"
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "ClawZ ${{ github.ref_name }} Candidate"
          releaseBody: |
            ## Release Candidate

            This draft release is a candidate build for validation and notarization.

            - Default state: draft
            - Public emergency distribution: use the `Publish Emergency RC` workflow
            - Stable publication: use the `Promote Stable Release` workflow after notarization succeeds

            See the [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          releaseDraft: true
          prerelease: true
          args: ${{ matrix.args }}

      - name: Initialize notarization metadata
        run: |
          STATUS="not_applicable"
          SIGNED_ONLY="false"
          if [ "${{ runner.os }}" = "macOS" ]; then
            STATUS="awaiting_notarization"
            SIGNED_ONLY="true"
          fi
          cat > "notarization-${{ matrix.rust_target }}.json" <<EOF
          {
            "tag": "${RC_TAG}",
            "target": "${{ matrix.rust_target }}",
            "platform": "${{ runner.os }}",
            "status": "${STATUS}",
            "signedOnly": ${SIGNED_ONLY}
          }
          EOF

      - name: Notarize candidate DMG
        if: runner.os == 'macOS' && env.APPLE_ID != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          NOTARIZATION_FILE="notarization-${{ matrix.rust_target }}.json"
          DMG_PATH=$(find src-tauri/target -name "*.dmg" -type f | head -1)
          write_notarization_file() {
            local status="$1"
            local signed_only="$2"
            local submission_id="${3:-}"
            if [ -n "$submission_id" ]; then
              cat > "$NOTARIZATION_FILE" <<EOF
          {
            "tag": "${RC_TAG}",
            "target": "${{ matrix.rust_target }}",
            "platform": "${{ runner.os }}",
            "status": "${status}",
            "signedOnly": ${signed_only},
            "submissionId": "${submission_id}"
          }
          EOF
            else
              cat > "$NOTARIZATION_FILE" <<EOF
          {
            "tag": "${RC_TAG}",
            "target": "${{ matrix.rust_target }}",
            "platform": "${{ runner.os }}",
            "status": "${status}",
            "signedOnly": ${signed_only}
          }
          EOF
            fi
          }

          if [ -z "$DMG_PATH" ]; then
            write_notarization_file "missing_dmg" "true"
            exit 0
          fi

          SUBMIT_OUTPUT=$(xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --output-format json) || {
              write_notarization_file "submit_failed" "true"
              exit 0
            }

          SUBMISSION_ID=$(python3 -c "import sys, json; print(json.load(sys.stdin)['id'])" <<< "$SUBMIT_OUTPUT")

          if xcrun notarytool wait "$SUBMISSION_ID" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --timeout 25m; then
            xcrun stapler staple "$DMG_PATH"
            STATUS="notarized"
            SIGNED_ONLY="false"
          else
            STATUS="pending"
            SIGNED_ONLY="true"
            xcrun notarytool info "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" || true
          fi

          write_notarization_file "$STATUS" "$SIGNED_ONLY" "$SUBMISSION_ID"

      - name: Normalize and upload package assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APP_VERSION="$(node scripts/build-manifest.mjs get appVersion)"
          BUNDLE_DIR="src-tauri/target/${{ matrix.rust_target }}/release/bundle"
          NORMALIZED_DIR="$RUNNER_TEMP/normalized-assets"

          mkdir -p "$NORMALIZED_DIR"

          while IFS= read -r -d '' artifact; do
            base_name="$(basename "$artifact")"

            case "$base_name" in
              *.app.tar.gz) suffix="app.tar.gz" ;;
              *.dmg) suffix="dmg" ;;
              *.deb) suffix="deb" ;;
              *.rpm) suffix="rpm" ;;
              *.msi) suffix="msi" ;;
              *.exe) suffix="exe" ;;
              *)
                continue
                ;;
            esac

            normalized_name="ClawZ-${APP_VERSION}-${{ matrix.platform_id }}-${{ matrix.arch_id }}.${suffix}"
            cp "$artifact" "$NORMALIZED_DIR/$normalized_name"

            gh release delete-asset "${RC_TAG}" "$base_name" --yes >/dev/null 2>&1 || true
            gh release delete-asset "${RC_TAG}" "$normalized_name" --yes >/dev/null 2>&1 || true
          done < <(find "$BUNDLE_DIR" -type f \( \
            -name "*.app.tar.gz" -o \
            -name "*.dmg" -o \
            -name "*.deb" -o \
            -name "*.rpm" -o \
            -name "*.msi" -o \
            -name "*.exe" \
          \) -print0)

          if ! find "$NORMALIZED_DIR" -type f -print -quit | grep -q .; then
            echo "No package assets found in $BUNDLE_DIR"
            exit 1
          fi

          gh release upload "${RC_TAG}" "$NORMALIZED_DIR"/* --clobber

      - name: Upload notarization metadata
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${RC_TAG}" "notarization-${{ matrix.rust_target }}.json" --clobber

  supersede_previous_rcs:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Mark previous RC releases as superseded
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURRENT_RC_TAG: ${{ github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import re
          import subprocess
          import tempfile

          current_tag = os.environ["CURRENT_RC_TAG"]
          match = re.fullmatch(r"(v\d+\.\d+\.\d+)-rc\.(\d+)", current_tag)
          if not match:
              raise SystemExit(f"Current RC tag does not match expected format: {current_tag}")

          base_tag = match.group(1)
          current_seq = int(match.group(2))

          releases = json.loads(
              subprocess.check_output(
                  [
                      "gh",
                      "api",
                      f"repos/{os.environ['GITHUB_REPOSITORY']}/releases?per_page=100",
                  ],
                  text=True,
              )
          )

          previous_tags = []
          for release in releases:
              tag = release.get("tag_name", "")
              other = re.fullmatch(rf"{re.escape(base_tag)}-rc\.(\d+)", tag)
              if other and int(other.group(1)) < current_seq:
                  previous_tags.append((int(other.group(1)), tag))

          previous_tags.sort()
          if not previous_tags:
              print(f"No previous RC releases found for {base_tag}")
              raise SystemExit(0)

          for _, tag in previous_tags:
              notes = f"""## Superseded Release Candidate

          This release candidate has been superseded by newer release candidate `{current_tag}`.

          - Do not promote this RC to stable unless you intentionally roll back
          - Use `{current_tag}` for ongoing validation and emergency distribution
          """

              with tempfile.NamedTemporaryFile("w", encoding="utf-8", delete=False) as handle:
                  handle.write(notes)
                  notes_path = handle.name

              try:
                  subprocess.check_call(
                      [
                          "gh",
                          "release",
                          "edit",
                          tag,
                          "--title",
                          f"ClawZ {tag} (Superseded by {current_tag})",
                          "--notes-file",
                          notes_path,
                      ]
                  )
                  print(f"Marked {tag} as superseded by {current_tag}")
              finally:
                  os.unlink(notes_path)
          PY
