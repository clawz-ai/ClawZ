name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: --target x86_64-unknown-linux-gnu
            rust_target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libfuse2

      - name: Install frontend dependencies
        run: pnpm install

      - name: Bundle Node.js runtime
        run: bash scripts/download-node.sh 22.22.0 ${{ matrix.rust_target }}

      - name: Bundle openclaw
        run: bash scripts/bundle-openclaw.sh

      - name: Generate build info
        run: bash scripts/gen-build-info.sh

      - name: Import Apple certificate
        if: runner.os == 'macOS' && env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Sign bundled native binaries
        if: runner.os == 'macOS' && env.APPLE_SIGNING_IDENTITY != ''
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          # Sign all native binaries in resources/ so Apple notarization passes
          find resources -type f \( \
            -name "node" -o -name "*.node" -o -name "*.dylib" \
            -o -name "spawn-helper" \
          \) | while read -r bin; do
            echo "Signing: $bin"
            codesign --force --options runtime --timestamp \
              --sign "$APPLE_SIGNING_IDENTITY" \
              --entitlements src-tauri/entitlements.plist \
              "$bin"
          done

      - name: Build Tauri app (sign only, no notarization)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID/PASSWORD/TEAM_ID intentionally omitted to skip notarization
          # Notarization is handled separately below with timeout control
        with:
          tagName: v__VERSION__
          releaseName: "ClawZ v__VERSION__"
          releaseBody: |
            See the [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Notarize and re-upload DMG
        if: runner.os == 'macOS' && env.APPLE_ID != ''
        continue-on-error: true
        timeout-minutes: 360
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG_PATH=$(find src-tauri/target -name "*.dmg" -type f | head -1)
          if [ -z "$DMG_PATH" ]; then
            echo "No DMG found, skipping notarization"
            exit 0
          fi
          DMG_NAME=$(basename "$DMG_PATH")
          echo "Notarizing: $DMG_PATH"

          # Submit for notarization (async)
          SUBMIT_OUTPUT=$(xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --output-format json)
          SUBMISSION_ID=$(echo "$SUBMIT_OUTPUT" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          echo "Submission ID: $SUBMISSION_ID"

          # Poll for result with 110min timeout (leaves margin within 120min step timeout)
          if xcrun notarytool wait "$SUBMISSION_ID" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --timeout 350m; then
            echo "Notarization succeeded, stapling ticket..."
            xcrun stapler staple "$DMG_PATH"

            # Replace the un-notarized DMG in the release with the stapled one
            TAG_NAME=$(echo "$GITHUB_REF" | sed 's|refs/tags/||')
            echo "Re-uploading stapled DMG to release $TAG_NAME..."
            gh release upload "$TAG_NAME" "$DMG_PATH" --clobber
            echo "Done! Stapled DMG uploaded to release."
          else
            echo "::warning::Notarization did not complete in time. Release will have signed but un-notarized DMG."
            # Log notarization details for debugging
            xcrun notarytool info "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" || true
          fi
