name: Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (lint + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Verify build manifest
        run: node scripts/build-manifest.mjs check

      - run: pnpm install --frozen-lockfile

      - name: Generate build info
        run: bash scripts/gen-build-info.sh

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Unit tests + coverage thresholds
        run: pnpm test:coverage

  rust:
    name: Rust (check + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev libgtk-3-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev

      - name: Create placeholder resource dirs
        run: |
          mkdir -p resources/NodeHelper.app/Contents/MacOS
          mkdir -p resources/openclaw
          mkdir -p resources/cli

      - name: Cargo check
        working-directory: src-tauri
        run: cargo check --locked

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy --locked -- -D warnings
